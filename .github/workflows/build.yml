name: Automate Windows Release

on:
  push:
    tags:
      - 'v*' 

permissions:
  contents: write 

jobs:
  build-and-publish:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build Standalone EXE with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "MANIK3_Mixer" "mk3_mix_gui.py"

    - name: Create Distribution Package
      run: |
        mkdir MANIK3_Release
        Move-Item -Path "dist\MANIK3_Mixer.exe" -Destination "MANIK3_Release\"
        Copy-Item -Path "SoundVolumeView.exe" -Destination "MANIK3_Release\"
        mkdir MANIK3_Release\apps\Chrome1
        mkdir MANIK3_Release\apps\Chrome2
        mkdir MANIK3_Release\apps\VLC
        echo "Place your portable Chrome and VLC folders in these directories." > MANIK3_Release\apps\README_APPS.txt
        
        # We use a generic name here so it's always the same for the upload step
        Compress-Archive -Path "MANIK3_Release\*" -DestinationPath "MANIK3_Virtual_DJ_Windows.zip"

    - name: 🚀 Publish to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        files: MANIK3_Virtual_DJ_Windows.zip
        generate_release_notes: true